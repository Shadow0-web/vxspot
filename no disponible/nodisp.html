<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link No Disponible</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .loader {
            border: 5px solid #333;
            border-top: 5px solid #00ff88;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .icono-pico {
            width: 25px;
            height: 25px;
            vertical-align: super;
            margin-right: 1px;
            vertical-align:sub;
            transition: transform 0.3s ease;
        }
        .boton-instalar33 {
            position: relative; 
            display: inline-block;
            background-color: #000000;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 7px;
            text-decoration: none; 
            text-align: center;
            cursor: pointer;
            transition: background-color 0.5s;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <h1>Link No Disponible</h1>
        <p>El link no está disponible porque está desactualizado. Espere a la próxima actualización.</p>
        <div class="loader"></div>
        <a class="boton-instalar33" href="https://vxspot-five.vercel.app/">←</a>
        <a href="https://discord.gg/Qp2R3h77Dh" class="boton-instalar33"> <img src="imagenes/discord.gif" class="icono-pico">  Support</a>
    </div>
    <footer>
        
    </footer>
</body>
</html>
